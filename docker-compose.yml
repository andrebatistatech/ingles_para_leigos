services:
  metabase:
    image: metabase/metabase:v0.52.8
    container_name: metabase_ingles_leigos
    ports:
      - "3030:3000" # Metabase em localhost:3030 (evita conflito com Next.js :3000)
    environment:
      MB_DB_TYPE: h2 # Banco interno do Metabase (dashboards, config, users do Metabase)
      JAVA_TIMEZONE: America/Sao_Paulo
    volumes:
      - metabase_data:/metabase-data
    restart: unless-stopped

volumes:
  metabase_data:
    driver: local
